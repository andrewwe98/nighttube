services:
  - type: web
    name: nighttube-backend
    env: node
    plan: free
    branch: main
    root: server
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: FRONTEND_URL
        value: "https://andrewwe98.github.io/nighttube"
      # Do NOT store secrets here in the repo. Set MONGODB_URI and JWT_SECRET in the Render dashboard.
